<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">

    <!-- Page title -->
    <title>Hawkins Labyrinth</title>

    <!-- Connect CSS file -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Game heading -->
<h1>Hawkins Labyrinth</h1>

<!-- Dice button -->
<button id="rollButton">Roll Dice</button>

<!-- Dice value -->
<h2 id="diceResult">Dice: 0</h2>

<!-- Player health -->
<h2 id="healthLabel">Player Health: 150</h2>

<!-- Current world -->
<h2 id="world">Cell Type: Unknown</h2>

<!-- Vecna health -->
<h2 id="vecnaHp">Vecna Health: 5</h2>

<!-- Unlock requirement -->
<h2 id="unlockLabel">Unlock Number:</h2>

<!-- Valid Adjacent Moves -->
<h2 id="adjacentInfo">Valid Moves:</h2>

<!-- Game board -->
<div id="board"></div>

<!-- Connect JavaScript file -->
<script src="script.js"></script>

</body>

</html>
